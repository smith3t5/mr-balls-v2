name = "mr-balls-v2"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "mr-balls-db"
database_id = "3ecfe27a-d96b-461d-937d-f047b77cd9d5"

# R2 Storage binding (for future use - user avatars, etc)
# Note: Commented out for now, uncomment when needed
